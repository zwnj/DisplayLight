name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Verify on Windows
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore DisplayLight.slnx --locked-mode

      - name: Check formatting
        run: dotnet format DisplayLight.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build DisplayLight.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DisplayLight.slnx --configuration Release --no-build --no-restore
