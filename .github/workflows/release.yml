name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Windows x64 release
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Validate release tag
        id: version
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
              throw "Release tag must use vMAJOR.MINOR.PATCH: $tag"
          }

          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "version=$($Matches.version)" -Encoding utf8

      - name: Verify source
        shell: pwsh
        run: ./scripts/verify.ps1

      - name: Restore Velopack tool
        shell: pwsh
        run: dotnet tool restore

      - name: Download previous Velopack release
        shell: pwsh
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet vpk download github `
              --repoUrl "https://github.com/${{ github.repository }}" `
              --token $env:GH_TOKEN `
              --outputDir artifacts/release

      - name: Package self-contained installer
        shell: pwsh
        run: ./scripts/package.ps1 -Version '${{ steps.version.outputs.version }}' -KeepReleaseDirectory

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: DisplayLight-${{ steps.version.outputs.version }}-win-x64
          path: artifacts/release
          if-no-files-found: error
          retention-days: 14

      - name: Attest installer and portable archive
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/release/*-Setup.exe
            artifacts/release/*-Portable.zip

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $notes = @"
          ## ダウンロード

          通常は``DisplayLight-win-Setup.exe``を使用してください。インストール版では次回以降の更新をアプリ内から適用できます。
          インストールせず試す場合は``DisplayLight-win-Portable.zip``を使用できますが、自動更新は利用できません。
          どちらも.NETランタイムの追加インストールは不要です。

          > [!WARNING]
          > このリリースはコード署名されていないため、Windows SmartScreenが警告を表示する可能性があります。
          "@

          dotnet vpk upload github `
              --repoUrl "https://github.com/${{ github.repository }}" `
              --token $env:GH_TOKEN `
              --outputDir artifacts/release `
              --tag $env:RELEASE_TAG `
              --releaseName "DisplayLight $env:RELEASE_VERSION" `
              --publish

          gh release edit $env:RELEASE_TAG --notes $notes
